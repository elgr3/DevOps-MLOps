# Workflow CD : build et push des images Docker (backend, database, httpd)
# Déclenché à la fin du workflow "Test Backend" : on ne pousse jamais une
# image si les tests ont échoué (équivalent moderne du "needs: test-backend").
name: Build and Push Images

on:
  workflow_run:
    workflows: ["Test Backend"]
    types:
      - completed

jobs:
  build-and-push:
    # Garde-fou : uniquement si les tests sont PASSÉS ET qu'on est sur master.
    # (TP : "le build et push n'ont lieu que sur la branche master")
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-24.04

    # Matrice : un seul job paramétré qui s'exécute 3 fois (un par image).
    # Évite la duplication de 3 steps "build & push" identiques.
    strategy:
      matrix:
        component: [backend, database, httpd]

    steps:
      - uses: actions/checkout@v4

      # Auth DockerHub via secrets (jamais de credentials en clair dans le YAML)
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # Build + push de l'image correspondant au composant de la matrice.
      # Le `context` change selon le composant (chemin du Dockerfile).
      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component == 'backend' && './simpleapi/simpleapi' || matrix.component == 'database' && './postgres' || './httpd' }}
          # Push toujours true ici car la condition `if:` du job garantit
          # déjà qu'on n'arrive là que sur master avec tests verts.
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-${{ matrix.component }}:latest
