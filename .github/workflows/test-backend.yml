name: Test Backend
on:
  push:
    branches: [master, develop, tp-docker]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test
        run: mvn -B verify --file ./simpleapi/simpleapi/pom.xml