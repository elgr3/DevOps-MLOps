# Workflow CI : compile et teste le backend Spring Boot à chaque push/PR
# Déclenché sur master et develop (branches de travail principales)
name: Test Backend

on:
  push:
    # Lance les tests sur master (prod) et develop (intégration)
    branches: [master, develop, tp-docker]
  pull_request:
    branches: [master, develop, tp-docker]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      # Récupère le code du dépôt dans le runner
      - uses: actions/checkout@v4

      # Installe le JDK 21 (Temurin) + cache Maven pour accélérer les builds
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # mvn clean verify : compile, lance les tests unitaires ET d'intégration
      # (Testcontainers démarre un vrai PostgreSQL dans un conteneur Docker)
      - name: Build and test
        run: mvn -B verify --file ./simpleapi/simpleapi/pom.xml
